name: Update Homebrew Formula

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  update-formula:
    runs-on: macos-latest
    steps:
      - name: Get release info
        id: release
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG=$(gh release view --repo ${{ github.repository }} --json tagName -q .tagName)
          fi
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Download and hash tarball
        id: hash
        run: |
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/${{ steps.release.outputs.tag }}.tar.gz"
          SHA=$(curl -sL "$URL" | shasum -a 256 | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Clone homebrew tap
        run: |
          git clone https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/Gauthierkk/homebrew-tap.git

      - name: Update formula
        run: |
          cd homebrew-tap
          sed -i '' 's|url ".*"|url "${{ steps.hash.outputs.url }}"|' Formula/cmdloop.rb
          sed -i '' 's|sha256 ".*"|sha256 "${{ steps.hash.outputs.sha256 }}"|' Formula/cmdloop.rb

      - name: Commit and push
        run: |
          cd homebrew-tap
          git remote set-url origin https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/Gauthierkk/homebrew-tap.git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/cmdloop.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update cmdloop to ${{ steps.release.outputs.version }}"
          git push
